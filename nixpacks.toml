[phases.setup]
nixPkgs = [
    "python311",
    "chromium",
    "nss",
    "nspr",
    "at-spi2-atk",
    "cups",
    "libdrm",
    "dbus",
    "expat",
    "libxcb",
    "libxkbcommon",
    "xorg.libX11",
    "xorg.libXcomposite",
    "xorg.libXdamage",
    "xorg.libXext",
    "xorg.libXfixes",
    "xorg.libXrandr",
    "mesa",
    "pango",
    "cairo",
    "alsa-lib",
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium --with-deps",
]

[start]
cmd = "python influence_negotiation/startup.py"
